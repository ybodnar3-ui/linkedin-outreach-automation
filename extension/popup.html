<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LI Outreach</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #fff;
      color: #1a1a1a;
    }
    .header {
      background: #0077b5;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .version { font-size: 10px; opacity: 0.7; margin-left: auto; }
    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    label { font-size: 11px; color: #555; margin-bottom: 3px; display: block; }
    input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #0077b5; }
    .field { display: flex; flex-direction: column; }
    button.primary {
      width: 100%;
      padding: 9px;
      background: #0077b5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.primary:hover { background: #005f91; }
    button.primary:disabled { background: #aac8df; cursor: not-allowed; }
    .status {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      font-weight: 500;
    }
    .status.connected   { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .status.disconnected{ background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .status.loading     { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .divider { height: 1px; background: #eee; }
    .hint { font-size: 10px; color: #888; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="header">
    <span>🔗</span>
    <h1>LI Outreach</h1>
    <span class="version">v1.0</span>
  </div>
  <div class="body">
    <div class="field">
      <label>Backend URL</label>
      <input id="apiUrl" type="url" placeholder="https://your-app.railway.app" />
    </div>
    <div class="field">
      <label>Extension Token</label>
      <input id="apiToken" type="password" placeholder="Paste token from Settings page" />
    </div>
    <div class="field">
      <label>Account ID</label>
      <input id="accountId" placeholder="Paste account ID from Accounts page" />
    </div>
    <button class="primary" id="saveBtn">Save & Connect</button>
    <div class="divider"></div>
    <div class="status disconnected" id="statusBox">Not connected</div>
    <p class="hint">
      Find the token on your <strong>Settings → Chrome Extension</strong> section.<br/>
      Find the Account ID on the <strong>Accounts</strong> page.
    </p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
